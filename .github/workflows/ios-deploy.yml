name: iOS — Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'capacitor.config.json'
      - 'package.json'
      - 'fastlane/**'
      - '.github/workflows/ios-deploy.yml'

  workflow_dispatch:
    inputs:
      lane:
        description: 'Which lane to run'
        required: true
        default: 'beta'
        type: choice
        options:
          - beta
          - release

jobs:
  deploy:
    name: Build & Deploy to App Store
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm install --legacy-peer-deps

      - name: Build Vite app
        run: npm run build

      - name: Initialize Capacitor iOS project
        run: |
          rm -rf ios
          npx cap add ios

      - name: Generate iOS app icons and splash screen
        run: npx capacitor-assets generate --ios

      - name: Sync web assets to iOS
        run: npx cap sync ios

      - name: Setup Ruby 3.3
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Write App Store Connect API key to disk
        run: |
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}" | base64 --decode > /tmp/api_key.p8

      - name: Run Fastlane lane
        run: bundle exec fastlane ${{ github.event.inputs.lane || 'beta' }}
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_PATH: /tmp/api_key.p8
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ATLAS-${{ github.run_number }}.ipa
          path: build/ATLAS.ipa
          retention-days: 30
