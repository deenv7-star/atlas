<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />

    <title>404 — הדף לא נמצא | ATLAS</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      .container { max-width: 400px; width: 100%; text-align: center; }

      .divider { width: 48px; height: 2px; background: #00D1C1; margin: 16px auto; opacity: 0.4; }

      p { font-size: 15px; color: #6B7280; margin-top: 10px; line-height: 1.6; }

        display: inline-flex; align-items: center; gap: 8px;

        background: #00D1C1; color: #0B1220;
        font-size: 14px; font-weight: 700;
