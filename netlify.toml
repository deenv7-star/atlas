# Netlify config for ATLAS SPA
# Ensures /dashboard and all client routes work when visited directly
[build]
  publish = "dist"
  command = "npm run build"

# SPA: serve index.html for all routes so /dashboard, /login etc. work when visited directly
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers (align with server/middleware/security-headers.js where possible)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
