version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
      POSTGRES_DB: atlas
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  api:
    build: .
    command: npm run dev
    ports:
      - '4000:4000'
    environment:
      DATABASE_URL: postgresql://atlas:atlas@postgres:5432/atlas
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: change_me_access_secret_123456
      JWT_REFRESH_SECRET: change_me_refresh_secret_123456
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
